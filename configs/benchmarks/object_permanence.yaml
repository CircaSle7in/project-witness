  - task_id: permanence_005
    video: null
    image: null
    category: object_permanence
    subcategory: multi_step_transfer
    prompt: "Person A puts a key in a drawer. While Person A leaves the room, Person B moves the key from the drawer to a jar on the shelf. Person A returns. Where does Person A believe the key is? Where is the key actually?"
    expected: "Person A believes the key is still in the drawer, because A did not witness the transfer. The key is actually in the jar on the shelf where Person B placed it."
    expected_actions: null
    expected_risks: null
    scoring: llm_judge
    difficulty: medium
    requires_uncertainty: false
    metadata:
      notes: "This is a classic Sally-Anne false-belief test adapted for object permanence."

