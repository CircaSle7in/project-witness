    video: null
    image: null
    category: object_permanence
    subcategory: occlusion
    prompt: "A red ball is on a table. A book is placed in front of the ball, hiding it from view. Is the ball still on the table?"
    expected: "Yes, the ball is still on the table behind the book. The book blocks the line of sight but does not remove or move the ball."
    expected_actions: null
    expected_risks: null
    scoring: llm_judge
