    metadata: null

  - task_id: affordance_006
    video: null
    image: null
    category: affordances
    subcategory: material
    prompt: "A standard brick is lying on the ground at a construction site. What can a person do with this brick?"
    expected: "The brick affords building or stacking into a wall, using as a weight or anchor, propping open a door, using as a step or platform, hammering (as an improvised tool), leveling uneven furniture, marking a boundary, supporting a shelf or board, and breaking into smaller pieces for fill material."
    expected_actions:
