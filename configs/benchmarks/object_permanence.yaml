  - task_id: permanence_007
    video: null
    image: null
    category: object_permanence
    subcategory: multi_step_transfer
    prompt: "Three cups are on a table. A coin is placed under Cup B (the middle cup). The cups are then shuffled: Cup B swaps position with Cup A, then Cup A (now in the middle) swaps position with Cup C. Under which cup is the coin?"
    expected: "The coin is under the cup that was originally Cup B. After the first swap, Cup B moved to the left position. After the second swap, Cup A (in the middle) and Cup C swapped, but Cup B stayed in the left position. The coin is under the leftmost cup."
    expected_actions: null
    expected_risks: null
    scoring: llm_judge
    difficulty: hard
    requires_uncertainty: false
    metadata:
      notes: "Shell game scenario. Tests tracking an object through multiple spatial transformations."

  - task_id: permanence_008
    video: null
    image: null
    category: object_permanence
    subcategory: disappearance_reasoning
    prompt: "You place your phone on the kitchen counter. You leave the room for 10 minutes. When you return, the phone is not on the counter. The window is closed, no one else is home, and the house has no pets. What are the most likely explanations?"
    expected: "The most likely explanations are: (1) you misremember where you placed it and it is elsewhere in the kitchen, (2) it vibrated or slid off the counter onto the floor or behind something, or (3) it was in a slightly different spot on the counter and is hidden behind another object. The phone still exists somewhere in the house since all exits were sealed."
    expected_actions: null
    expected_risks: null
    scoring: llm_judge
    difficulty: hard
    requires_uncertainty: true
    metadata:
      notes: "Tests reasoning about plausible explanations when an object seems to vanish, while maintaining the principle that it still exists."
