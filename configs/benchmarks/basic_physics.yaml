    prompt: "A small rubber ball is placed on top of a large basketball, and both are dropped together from waist height onto a hard floor. The basketball hits the floor first. Describe what happens to the small ball."
    expected: "The small ball launches dramatically upward, reaching a height much greater than the original drop height. When the basketball bounces off the floor and collides with the small ball above it, the basketball transfers a large fraction of its momentum to the lighter ball. The mass difference amplifies the effect, sending the small ball high into the air."
    expected_actions: null
    expected_risks: null
    scoring: llm_judge
