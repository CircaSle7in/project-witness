# Model Registry - Project Witness v0.1
# All inference is API-only. No local GPU required.

models:
  gemini-flash:
    provider: google
    model_id: gemini-2.5-flash
    api_key_env: GEMINI_API_KEY
    capabilities:
      - text
      - image
      - video
    roles:
      - evaluator
      - judge
    max_tokens: 4096
    notes: "Primary VLM and LLM judge. Free tier with generous limits."

  qwen-72b:
    provider: huggingface
    model_id: Qwen/Qwen2.5-72B-Instruct
    api_key_env: HF_TOKEN
    capabilities:
      - text
    roles:
      - evaluator
    max_tokens: 4096
    notes: "72B open-weight model via HF Inference API. Text-only but strong physics reasoning. Free tier."

  # VL variant - use when HF serverless endpoint is stable
