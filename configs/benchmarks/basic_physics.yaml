    image: null
    category: basic_physics
    subcategory: gravity_and_friction
    prompt: "A wooden block is placed on a tilted metal ramp. The ramp angle is gradually increased. Describe what happens as the angle grows steeper."
    expected: "Initially the block stays in place because static friction is strong enough to resist the gravitational component pulling it down the slope. As the angle increases, the gravitational component along the ramp grows while the normal force decreases, reducing the maximum static friction. At a critical angle the block begins to slide. Once sliding, kinetic friction (which is less than static friction) acts on it, so the block accelerates down the ramp."
    expected_actions: null
    expected_risks: null
    scoring: llm_judge
    difficulty: hard
    requires_uncertainty: false
    metadata: null

  - task_id: physics_008
