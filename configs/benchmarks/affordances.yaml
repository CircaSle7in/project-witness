  - task_id: affordance_007
    video: null
    image: null
    category: affordances
    subcategory: multi_object
    prompt: "On a desk you see: a rubber band, a pencil, a sheet of paper, and a paper clip. What can you do with these objects individually and in combination?"
    expected: "Individually: the rubber band affords stretching, binding, and launching small objects; the pencil affords writing, drawing, poking holes, and drumming; the paper affords writing on, folding (origami, paper airplane), wrapping, and fanning; the paper clip affords clipping papers, picking locks (in fiction), resetting small buttons, and bending into shapes. In combination: rubber band plus pencil creates a catapult or slingshot, paper clip holds multiple sheets of paper, pencil on paper enables writing or drawing, rubber band bundles pencil and paper together, and paper clip bent around pencil creates a spinning toy."
    expected_actions:
      - write
      - draw
      - fold_paper
      - make_paper_airplane
      - clip_papers_together
      - launch_rubber_band
      - bind_objects_with_rubber_band
      - build_catapult
      - reset_button_with_clip
      - bend_clip_into_shape
      - fan_with_paper
    expected_risks:
      - paper_cut
      - rubber_band_snap
      - pencil_point_poke
      - eye_injury_from_launched_object
    scoring: multi_match
    difficulty: hard
    requires_uncertainty: false
    metadata:
      notes: "Tests combinatorial affordance reasoning across multiple objects."

  - task_id: affordance_008
    video: null
    image: null
    category: affordances
    subcategory: context_dependent
    prompt: "A plastic water bottle is half full of water. You are outdoors on a sunny day with no other tools available. What does this bottle afford?"
    expected: "The bottle affords drinking the water, pouring water to clean hands or a wound, watering a plant, cooling off by pouring on skin, using as a lens to focus sunlight (starting a fire in an emergency), using as a magnifier, refilling from a stream, carrying water, using as a weight or anchor for a tarp, squeezing to create a water jet, cutting in half to make a scoop or funnel, and using as a rolling pin on soft material."
    expected_actions:
      - drink
      - pour_to_clean
      - water_plant
      - cool_off
      - focus_sunlight
      - refill
      - carry_water
      - use_as_weight
      - squeeze_for_jet
      - cut_to_make_funnel
      - use_as_rolling_pin
    expected_risks:
      - dehydration_if_water_wasted
      - fire_hazard_from_light_focus
      - sharp_edges_if_cut
      - contamination_if_refilled_from_unsafe_source
    scoring: multi_match
    difficulty: hard
    requires_uncertainty: false
    metadata:
      notes: "Tests context-sensitive affordance reasoning. The outdoor setting and lack of other tools should expand the model's affordance set beyond typical indoor uses."
