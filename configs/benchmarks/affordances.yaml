# Affordances Benchmark - Project Witness v0.1
# Tests whether a model can identify what actions an object affords.
# No existing benchmark tests this systematically.
# Scoring uses multi_match to compare against lists of valid actions and risks.

tasks:
  - task_id: affordance_001
    video: null
    image: null
    category: affordances
    subcategory: container
    prompt: "A ceramic coffee mug is sitting empty on a kitchen table. What can a person do with this mug?"
    expected: "The mug affords filling with liquid, drinking from, pouring from, holding small objects, carrying by the handle, moving to another location, stacking with other mugs, and using as a small container for pens or utensils."
    expected_actions:
      - fill_with_liquid
      - drink_from
      - pour_from
      - hold_small_objects
      - carry_by_handle
      - move
      - stack
    expected_risks:
      - drop_and_break
      - burn_hand_if_hot_liquid
      - spill_contents
    scoring: multi_match
    difficulty: easy
    requires_uncertainty: false
    metadata: null

  - task_id: affordance_002
    video: null
    image: null
    category: affordances
    subcategory: tool
    prompt: "A sharp kitchen knife is lying on a wooden cutting board. What actions does this knife afford?"
    expected: "The knife affords cutting food, slicing, dicing, chopping, mincing, spreading soft substances like butter, scraping ingredients off the board, and prying apart stuck items. It can also be carried, washed, and stored."
    expected_actions:
      - cut
      - slice
      - dice
      - chop
      - mince
      - spread
      - scrape
      - carry
      - store
    expected_risks:
      - cut_hand
      - drop_on_foot
      - damage_surface_if_misused
      - injure_others_if_handled_carelessly
    scoring: multi_match
    difficulty: easy
    requires_uncertainty: false
    metadata: null

  - task_id: affordance_003
    video: null
    image: null
    category: affordances
    subcategory: container
    prompt: "A large empty cardboard box (roughly 60cm on each side) is on the floor of a living room. What can a person do with this box?"
    expected: "The box affords storing items inside it, carrying objects, stacking on top of or beneath other boxes, sitting on (if sturdy enough), standing on briefly, using as a makeshift table, cutting into a costume or playhouse for a child, flattening for recycling, using as a sled on a hill, and breaking down for packing material."
    expected_actions:
      - store_items
      - carry_objects
      - stack
      - sit_on
      - stand_on
      - use_as_table
      - cut_into_shape
      - flatten
      - recycle
      - use_as_play_structure
    expected_risks:
      - collapse_under_weight
      - tear_if_overloaded
      - trip_hazard
    scoring: multi_match
    difficulty: easy
    requires_uncertainty: false
    metadata: null

  - task_id: affordance_004
    video: null
    image: null
    category: affordances
    subcategory: flexible_object
    prompt: "A three-meter length of sturdy rope is coiled on a workbench. What actions does this rope afford?"
    expected: "The rope affords tying objects together, pulling or towing, hanging items, creating a clothesline, securing a load, lashing, climbing (if anchored), swinging, making a lasso, skipping, bundling items, creating a barrier or boundary marker, and using as an emergency belt or strap."
    expected_actions:
      - tie
      - pull
      - tow
      - hang_items
      - secure_load
      - climb
      - swing
      - skip_rope
      - bundle
      - create_boundary
      - lash
    expected_risks:
      - trip_hazard
      - strangulation_if_misused
      - rope_burn_from_friction
      - snap_under_excessive_load
    scoring: multi_match
    difficulty: medium
    requires_uncertainty: false
    metadata: null

  - task_id: affordance_005
    video: null
    image: null
    category: affordances
    subcategory: furniture
    prompt: "A sturdy wooden chair is in the middle of a room. What actions does this chair afford beyond sitting?"
    expected: "Beyond sitting, the chair affords standing on to reach high places, using as a step stool, propping open a door, wedging under a door handle for security, hanging clothes on the back, using as a small table, stacking with other chairs, moving as a barrier, and resting feet on."
    expected_actions:
      - sit
      - stand_on
      - use_as_step_stool
      - prop_door_open
      - wedge_door_closed
      - hang_clothes
      - use_as_table
      - stack
      - move_as_barrier
      - rest_feet_on
    expected_risks:
      - tip_over_if_stood_on_edge
      - fall_from_height
      - scratch_floor_when_dragged
      - pinch_fingers_when_folding
    scoring: multi_match
    difficulty: medium
