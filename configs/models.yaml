# Model Registry - Project Witness v0.1
# All inference is API-only. No local GPU required.

models:
  gemini-flash:
    provider: google
    model_id: gemini-2.0-flash
    api_key_env: GEMINI_API_KEY
    capabilities:
      - text
      - image
      - video
    roles:
      - evaluator
      - judge
    max_tokens: 4096
    notes: "Primary VLM and LLM judge. Free tier with generous limits."

  qwen-vl:
    provider: huggingface  # or together_ai
    model_id: Qwen/Qwen2.5-VL-7B-Instruct
    api_key_env: QWEN_API_KEY
    api_base_env: QWEN_API_BASE  # optional override
    capabilities:
      - text
      - image
    roles:
      - evaluator
    max_tokens: 4096
    notes: "Best open-source video VLM. Apache 2.0. Hosted inference only in v0.1."

  # Stretch goal - only if hosted endpoint available
